<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account - Palantir Clinic</title>
    <link rel="stylesheet" href="../styles/register.css">
    <style>
        .pw-rule        { transition: color 0.2s; }
        .pw-rule.pass   { color: #16a34a; }
        .pw-rule.fail   { color: #dc2626; }
    </style>
</head>
<body>

<header>
    <nav>
        <h2 class="logo">Palantir Clinic</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/pages/about.html">About</a></li>
            <li><a href="/pages/locations/locations.html">Locations</a></li>
            <li><a href="/auth/staff_login.html">Staff Portal</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="form-card">
        <h2>Create Account</h2>
        <p class="subtitle">Register to book and manage appointments</p>

        <div class="form-grid">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="fname" placeholder="First name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lname" placeholder="Last name" required>
            </div>
            <div class="form-group full-width">
                <label>Email</label>
                <input type="text" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group full-width">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                <div id="pwStrength" style="margin-top:8px;display:flex;flex-direction:column;gap:4px;font-size:12px;color:#666;display:none">
                    <div id="pw-len"   class="pw-rule">✗ At least 8 characters</div>
                    <div id="pw-upper" class="pw-rule">✗ One uppercase letter</div>
                    <div id="pw-num"   class="pw-rule">✗ One number</div>
                    <div id="pw-spec"  class="pw-rule">✗ One special character (!@#$…)</div>
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phonenum" placeholder="(555) 000-0000" required>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="DOB" required>
            </div>
        </div>

        <button type="button" id="btn">Create Account</button>
        <p id="message"></p>

        <p class="switch-link">Already have an account? <a href="/auth/patient_login.html">Sign in here</a></p>
    </div>
</section>

<script src="../scripts/auth/register.js"></script>
</body>
</html>
